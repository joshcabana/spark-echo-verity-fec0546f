name: verity-ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Canonical defaults for static CI gates (build/lint/test/typecheck/alignment).
      VITE_SUPABASE_PROJECT_ID: nhpbxlvogqnqutmflwlk
      VITE_SUPABASE_URL: https://nhpbxlvogqnqutmflwlk.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci_placeholder_anon_key
      VITE_REQUIRE_PHONE_VERIFICATION: "false"
      VITE_REQUIRE_GOOGLE_AUTH: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Runtime environment contract
        run: npm run check:runtime-env

      - name: Project alignment
        run: npm run check:project-alignment

      - name: No hardcoded Supabase credentials
        run: npm run check:no-hardcoded-supabase

      - name: Auth settings
        run: npm run check:auth-settings

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Bundle boundaries
        run: npm run check:bundle-boundaries

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke suite
        run: npm run test:smoke
